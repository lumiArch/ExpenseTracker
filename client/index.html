<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>Expense Tracker</h1>
      <p>Monitor and categorize your spending</p>
    </header>

    <!-- summary bar -->
    <section class="panel" id="summaryPanel" aria-label="Spending summary">
      <div class="summary-item">Total: <span id="totalAmount">$0.00</span></div>
      <div class="summary-item">Count: <span id="totalCount">0</span></div>
    </section>

    <!-- add / edit form -->
    <section class="panel" aria-label="Expense form">
      <form id="expenseForm">
        <input type="hidden" id="expenseId" />
        <div class="form-row">
          <label for="title">Title</label>
          <input type="text" id="title" required maxlength="150" placeholder="Coffee, groceries…" />
        </div>
        <div class="form-row">
          <label for="amount">Amount</label>
          <input type="number" id="amount" required min="0.01" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-row">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Choose</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Rent">Rent</option>
            <option value="Misc">Misc</option>
          </select>
        </div>
        <div class="form-row">
          <label for="transactionDate">Date</label>
          <input type="date" id="transactionDate" required min="1900-01-01" max="9999-12-31" />
        </div>
        <div class="form-row">
          <label for="notes">Notes</label>
          <textarea id="notes" rows="2" maxlength="350" placeholder="Optional details"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" id="submitButton">Add Expense</button>
          <button type="button" id="resetButton" class="secondary">Reset</button>
        </div>
      </form>
    </section>

    <!-- expense list -->
    <section class="panel" aria-label="Expense list">
      <h2 class="panel-title">Logs</h2>
      <div class="table-actions">
        <input type="text" id="filterInput" placeholder="Filter by title or category"
          aria-label="Filter expenses" />
      </div>
      <div class="table-wrap" aria-live="polite" aria-atomic="true">
        <table id="expenseTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Title</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- insights panel -->
    <section class="panel" aria-label="Spending insights">
      <h2 class="panel-title">Insights</h2>
      <div class="insights-grid">
        <div>
          <h3 class="insight-heading">By Category</h3>
          <div id="categoryList"></div>
        </div>
        <div>
          <h3 class="insight-heading">Monthly Trend</h3>
          <div id="monthlyList"></div>
        </div>
      </div>
    </section>

    <!-- error banner -->
    <div id="apiError" class="error" hidden></div>
  </main>

  <!-- success toast -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
